<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Care Schedule - Family Calendar</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="eyebrow">Family Log - Timo</div>
      <h1>Baby Schedule</h1>
      <p>Baby days, visits, and Shay's schedule, all on one board.</p>
    </div>
    <div class="controls">
      <div class="seg">
        <button id="prevBtn">Prev</button>
        <span id="currentMonthLabel"></span>
        <button id="nextBtn">Next</button>
      </div>
      <div class="stepper">
        <label>Months</label>
        <button id="stepDown">-</button>
        <input id="monthsInput" type="text" value="12" readonly>
        <button id="stepUp">+</button>
      </div>
    </div>
  </header>
  <div class="legend" id="legend"></div>
  <div class="layout">
    <div class="cal-wrap"><div class="months" id="monthsContainer"></div></div>
    <div class="sidebar">
      <h2>All events</h2>
      <div class="event-list" id="eventList"></div>
      <div class="save-status" id="saveStatus">Loading...</div>
    </div>
  </div>
</div>
<script type="module" src="js/main.js"></script>
</body>
</html>
