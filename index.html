<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Baby Care Schedule - Family Calendar</title>
</head>
<body>
<script>
  window.__APP_VERSION = String(Date.now());
  const stylesheet = document.createElement('link');
  stylesheet.rel = 'stylesheet';
  stylesheet.href = `css/styles.css?v=${window.__APP_VERSION}`;
  document.head.appendChild(stylesheet);
</script>
<div class="app">
  <header>
    <div>
      <div class="eyebrow">FAMILY LOG · <span class="walnut-icon" aria-label="Walnut" role="img"></span></div>
      <h1>Baby Schedule</h1>
      <p>Walnut's monthly family calendar</p>
    </div>
    <div class="controls">
      <div class="seg">
        <button id="prevBtn" type="button" aria-label="Previous month">&larr;</button>
        <span id="currentMonthLabel" aria-live="polite"></span>
        <button id="nextBtn" type="button" aria-label="Next month">&rarr;</button>
      </div>
      <button class="control-btn" id="todayBtn" type="button" aria-label="Go to current month">Today</button>
      <div class="stepper">
        <label>Months</label>
        <button id="stepDown" type="button" aria-label="Show fewer months">-</button>
        <input id="monthsInput" type="text" value="12" readonly>
        <button id="stepUp" type="button" aria-label="Show more months">+</button>
      </div>
    </div>
  </header>
  <div class="legend" id="legend"></div>
  <div class="layout">
    <div class="cal-wrap"><div class="months" id="monthsContainer"></div></div>
    <div class="sidebar">
      <h2>All events</h2>
      <div class="event-list" id="eventList"></div>
      <div class="save-status" id="saveStatus">Loading...</div>
    </div>
  </div>
</div>
<script type="module">
  import(`./js/main.js?v=${window.__APP_VERSION}`);
</script>
</body>
</html>
