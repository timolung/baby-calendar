<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Baby Schedule — Family Calendar</title>
<style>
:root{--paper:#f4f6f3;--panel:#fff;--ink:#1f2a24;--soft:#5b6660;--line:#dde3dd;--line2:#e9ede8;--baby:#c9694f;--family:#6e8f73;--shay:#4e7391;--vacation:#c79a34;--tbd:#8b7d95;--shadow:0 1px 2px rgba(31,42,36,.06),0 6px 20px rgba(31,42,36,.05)}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;padding:28px 24px 60px}.app{max-width:1400px;margin:0 auto}header{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-bottom:22px;border-bottom:1px solid var(--line);padding-bottom:18px}.eyebrow{color:var(--baby);font-size:12px;letter-spacing:.05em;text-transform:uppercase;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}h1{font-size:32px;margin:0 0 4px;letter-spacing:-.02em}p{margin:0;color:var(--soft);font-size:13.5px}.controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.seg,.stepper{display:flex;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden}.seg button,.stepper button{border:0;background:transparent;padding:8px 12px;cursor:pointer;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.seg button:hover,.stepper button:hover{background:var(--line2)}#currentMonthLabel{min-width:150px;text-align:center;border-left:1px solid var(--line);border-right:1px solid var(--line);padding:8px 12px;font-weight:600}.stepper{gap:8px;padding:5px 10px}.stepper label{font-size:12px;color:var(--soft)}#monthsInput{width:30px;text-align:center;border:0;background:transparent;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.legend{display:flex;gap:15px;flex-wrap:wrap;margin-bottom:20px}.legend .item{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--soft)}.dot{width:10px;height:10px;border-radius:3px;display:inline-block}.layout{display:flex;gap:24px;align-items:flex-start}.cal-wrap{flex:1;min-width:0}.months{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}.month-card,.sidebar{background:var(--panel);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}.month-card{padding:14px 14px 16px}.month-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px}.month-head .m{font-size:19px;font-weight:700}.month-head .y{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--soft)}.dow-row,.day-row{display:grid;grid-template-columns:repeat(7,1fr)}.dow-row span{text-align:center;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--soft);font-family:ui-monospace,SFMono-Regular,Menlo,monospace}.day-cell{min-height:78px;padding:4px 3px 2px;position:relative;border-top:1px solid var(--line2)}.day-cell.out{opacity:.36}.day-cell .num{font-size:11px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;color:var(--soft)}.day-cell.today .num{background:var(--ink);color:var(--paper);border-radius:50%;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px}.pill{display:block;color:#fff;border-radius:6px;padding:2px 5px;margin-top:3px;font-size:10.5px;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.more{font-size:10.5px;color:var(--soft);margin-top:3px}.sidebar{width:300px;flex-shrink:0;padding:16px 16px 18px;position:sticky;top:18px}.sidebar h2{font-size:18px;margin:0 0 12px}.event-list{display:flex;flex-direction:column;gap:8px;max-height:640px;overflow-y:auto}.event-row{display:flex;gap:8px;padding:8px;border-radius:8px;cursor:pointer;border:1px solid transparent}.event-row:hover{background:var(--line2);border-color:var(--line)}.bar-color{width:5px;align-self:stretch;border-radius:99px;flex-shrink:0;min-height:34px}.t{font-size:13.5px;font-weight:600;line-height:1.25}.d{font-size:11.5px;color:var(--soft);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;margin-top:2px}.save-status{font-size:11.5px;color:var(--soft);text-align:left;margin-top:12px;min-height:14px}.modal-backdrop{position:fixed;inset:0;background:rgba(20,26,22,.42);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}.modal{background:var(--panel);border-radius:14px;width:100%;max-width:420px;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}.modal h3{margin:0 0 12px;font-size:20px}.notes{white-space:pre-wrap;font-size:13.5px;color:var(--soft);line-height:1.45;margin-top:12px}.btn{background:var(--ink);color:var(--paper);border:0;border-radius:8px;padding:8px 14px;cursor:pointer;margin-top:18px;float:right}@media(max-width:880px){body{padding:20px 16px 44px}.layout{flex-direction:column}.sidebar{width:100%;position:static}.day-cell{min-height:64px}.pill{font-size:9.5px}}
</style>
</head>
<body>
<div class="app">
<header>
<div><div class="eyebrow">Family Log · Timo</div><h1>Baby Schedule</h1><p>Baby days, family visits, and Shay's schedule, all on one board.</p></div>
<div class="controls"><div class="seg"><button id="prevBtn">←</button><span id="currentMonthLabel"></span><button id="nextBtn">→</button></div><div class="stepper"><label>Months</label><button id="stepDown">−</button><input id="monthsInput" value="12" readonly><button id="stepUp">+</button></div></div>
</header>
<div class="legend" id="legend"></div>
<div class="layout"><div class="cal-wrap"><div class="months" id="monthsContainer"></div></div><div class="sidebar"><h2>All events</h2><div class="event-list" id="eventList"></div><div class="save-status" id="saveStatus">Loading…</div></div></div>
</div>
<script>
(function(){
const CATEGORIES={baby:{label:"Baby milestone",color:"#C9694F"},family:{label:"Family visit",color:"#6E8F73"},shay:{label:"Shay's schedule",color:"#4E7391"},vacation:{label:"Vacation / time off",color:"#C79A34"},tbd:{label:"Undecided / TBD",color:"#8B7D95"}};
// Later: paste the published Google Sheet CSV URL here. Expected columns: title,start,end,category,notes. Dates should be YYYY-MM-DD.
const GOOGLE_SHEET_CSV_URL="";
let events=[];const today=new Date();let anchorYear=today.getFullYear(),anchorMonth=8,monthsToShow=12;
const pad=n=>String(n).padStart(2,"0"),toISO=(y,m,d)=>{const dt=new Date(y,m,d);return`${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}`},MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"],MONTH_SHORT=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
function seedEvents(){const Y=today.getFullYear(),Y2=Y+1;return[{id:"sample1",title:"Baby born",start:`${Y}-09-11`,end:`${Y}-09-12`,category:"baby",notes:""},{id:"sample2",title:"Timo's 1st month · my mom here",start:`${Y}-09-14`,end:`${Y}-10-11`,category:"family",notes:""},{id:"sample3",title:"Shay: FMLA / research",start:`${Y}-10-11`,end:`${Y}-12-04`,category:"shay",notes:""},{id:"sample4",title:"My dad?? or Timo's mom??",start:`${Y}-12-07`,end:`${Y}-12-18`,category:"tbd",notes:"Shay on perfusion elective"},{id:"sample5",title:"Shay: research / holidays",start:`${Y}-12-21`,end:`${Y2}-01-03`,category:"shay",notes:""},{id:"sample6",title:"Timo's 2nd month",start:`${Y2}-01-04`,end:`${Y2}-01-30`,category:"baby",notes:"Shay on cardiac"},{id:"sample7",title:"Timo's 3rd month",start:`${Y2}-02-01`,end:`${Y2}-02-28`,category:"baby",notes:"Shay on ECHO"},{id:"sample8",title:"My mom's back for 2 weeks?",start:`${Y2}-03-01`,end:`${Y2}-03-14`,category:"family",notes:"I'm on thoracic"},{id:"sample9",title:"Shay: research / vacation!!",start:`${Y2}-03-15`,end:`${Y2}-03-31`,category:"vacation",notes:"Or on thoracic — could swap with my mom"},{id:"sample10",title:"Timo's mom visiting",start:`${Y2}-04-01`,end:`${Y2}-05-02`,category:"family",notes:"Shay on cardiac"},{id:"sample11",title:"Shay: ICU / take vacation?",start:`${Y2}-05-03`,end:`${Y2}-05-14`,category:"shay",notes:"Not sure this works — may need daycare"}]}
function setSaveStatus(msg){const el=document.getElementById("saveStatus");if(el)el.textContent=msg}
function parseCsv(text){const rows=[];let row=[],field="",inQuotes=false;for(let i=0;i<text.length;i++){const ch=text[i],next=text[i+1];if(ch==='"'){if(inQuotes&&next==='"'){field+='"';i++}else inQuotes=!inQuotes}else if(ch===','&&!inQuotes){row.push(field);field=""}else if((ch==='\n'||ch==='\r')&&!inQuotes){if(ch==='\r'&&next==='\n')i++;row.push(field);if(row.some(cell=>cell.trim()!==""))rows.push(row);row=[];field=""}else field+=ch}row.push(field);if(row.some(cell=>cell.trim()!==""))rows.push(row);return rows}
function normalizeCategory(raw){const key=(raw||"tbd").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"");return CATEGORIES[key]?key:"tbd"}
function sheetRowsToEvents(rows){if(!rows.length)return[];const headers=rows[0].map(h=>h.trim().toLowerCase()),idx=name=>headers.indexOf(name),titleIdx=idx("title"),startIdx=idx("start"),endIdx=idx("end"),catIdx=idx("category"),notesIdx=idx("notes");return rows.slice(1).map((r,i)=>{const title=(r[titleIdx]||"").trim(),start=(r[startIdx]||"").trim(),end=(r[endIdx]||start).trim();if(!title||!/^\d{4}-\d{2}-\d{2}$/.test(start))return null;return{id:`sheet_${i}_${start}`,title,start,end:/^\d{4}-\d{2}-\d{2}$/.test(end)?end:start,category:normalizeCategory(catIdx>=0?r[catIdx]:"tbd"),notes:notesIdx>=0?(r[notesIdx]||"").trim():""}}).filter(Boolean)}
async function loadEvents(){setSaveStatus("Loading events…");if(GOOGLE_SHEET_CSV_URL){try{const response=await fetch(GOOGLE_SHEET_CSV_URL,{cache:"no-store"});if(!response.ok)throw new Error(`CSV fetch failed: ${response.status}`);events=sheetRowsToEvents(parseCsv(await response.text()));setSaveStatus(`Loaded ${events.length} events from Google Sheets`)}catch(e){console.error(e);events=seedEvents();setSaveStatus("Could not load Google Sheet — showing built-in sample events")}}else{events=seedEvents();setSaveStatus("Showing sample events. Add the Google Sheet CSV URL in index.html later.")}render()}
function getWeeks(year,monthIndex0){const first=new Date(year,monthIndex0,1),startDow=first.getDay(),gridStart=new Date(year,monthIndex0,1-startDow),weeks=[];for(let w=0;w<6;w++){const week=[];for(let d=0;d<7;d++){const dt=new Date(gridStart.getFullYear(),gridStart.getMonth(),gridStart.getDate()+w*7+d);week.push({iso:toISO(dt.getFullYear(),dt.getMonth(),dt.getDate()),day:dt.getDate(),inMonth:dt.getMonth()===monthIndex0&&dt.getFullYear()===year,isToday:toISO(dt.getFullYear(),dt.getMonth(),dt.getDate())===toISO(today.getFullYear(),today.getMonth(),today.getDate())})}weeks.push(week)}return weeks}
function formatRange(start,end){const[sy,sm,sd]=start.split("-").map(Number),[ey,em,ed]=end.split("-").map(Number);if(sy===ey&&sm===em)return sd===ed?`${MONTH_SHORT[sm-1]} ${sd}, ${sy}`:`${MONTH_SHORT[sm-1]} ${sd}–${ed}, ${sy}`;if(sy===ey)return`${MONTH_SHORT[sm-1]} ${sd} – ${MONTH_SHORT[em-1]} ${ed}, ${sy}`;return`${MONTH_SHORT[sm-1]} ${sd}, ${sy} – ${MONTH_SHORT[em-1]} ${ed}, ${ey}`}
function escapeHtml(s){const d=document.createElement("div");d.textContent=s;return d.innerHTML}
function render(){renderLegend();renderMonths();renderEventList()}
function renderLegend(){document.getElementById("legend").innerHTML=Object.entries(CATEGORIES).map(([key,c])=>`<span class="item"><span class="dot" style="background:${c.color}"></span>${c.label}</span>`).join("")}
function renderMonths(){document.getElementById("currentMonthLabel").textContent=`${MONTH_NAMES[anchorMonth]} ${anchorYear}`;document.getElementById("monthsInput").value=monthsToShow;const container=document.getElementById("monthsContainer");container.innerHTML="";for(let i=0;i<monthsToShow;i++){let y=anchorYear,m=anchorMonth+i;y+=Math.floor(m/12);m=((m%12)+12)%12;container.appendChild(buildMonthCard(y,m))}}
function buildMonthCard(year,monthIndex0){const weeks=getWeeks(year,monthIndex0),card=document.createElement("div");card.className="month-card";card.innerHTML=`<div class="month-head"><span class="m">${MONTH_NAMES[monthIndex0]}</span><span class="y">${year}</span></div><div class="dow-row">${DOW.map(d=>`<span>${d}</span>`).join("")}</div>`;weeks.forEach(week=>{const dayRow=document.createElement("div");dayRow.className="day-row";week.forEach(cell=>{const items=events.filter(e=>e.start<=cell.iso&&e.end>=cell.iso),c=document.createElement("div");c.className="day-cell"+(cell.inMonth?"":" out")+(cell.isToday?" today":"");c.innerHTML=`<span class="num">${cell.day}</span>`+items.slice(0,3).map(e=>`<span class="pill" style="background:${(CATEGORIES[e.category]||CATEGORIES.tbd).color}" title="${escapeHtml(e.title)} (${formatRange(e.start,e.end)})" data-id="${e.id}">${escapeHtml(e.title)}</span>`).join("")+(items.length>3?`<div class="more">+${items.length-3} more</div>`:"");dayRow.appendChild(c)});card.appendChild(dayRow)});card.querySelectorAll(".pill").forEach(p=>p.addEventListener("click",ev=>{ev.stopPropagation();openEventDetails(p.dataset.id)}));return card}
function renderEventList(){const el=document.getElementById("eventList");if(!events.length){el.innerHTML=`<div class="d">No events yet.</div>`;return}el.innerHTML="";[...events].sort((a,b)=>a.start.localeCompare(b.start)).forEach(e=>{const cat=CATEGORIES[e.category]||CATEGORIES.tbd,row=document.createElement("div");row.className="event-row";row.innerHTML=`<span class="bar-color" style="background:${cat.color}"></span><span class="meta"><div class="t">${escapeHtml(e.title)}</div><div class="d">${formatRange(e.start,e.end)}</div></span>`;row.addEventListener("click",()=>openEventDetails(e.id));el.appendChild(row)})}
function openEventDetails(id){const e=events.find(ev=>ev.id===id);if(!e)return;const cat=CATEGORIES[e.category]||CATEGORIES.tbd,backdrop=document.createElement("div");backdrop.className="modal-backdrop";backdrop.innerHTML=`<div class="modal"><h3>${escapeHtml(e.title)}</h3><div class="d">${formatRange(e.start,e.end)}</div><div class="d"><span class="dot" style="background:${cat.color}"></span> ${escapeHtml(cat.label)}</div>${e.notes?`<div class="notes">${escapeHtml(e.notes)}</div>`:""}<button class="btn" id="modalClose">Close</button></div>`;document.body.appendChild(backdrop);backdrop.addEventListener("click",ev=>{if(ev.target===backdrop)backdrop.remove()});backdrop.querySelector("#modalClose").addEventListener("click",()=>backdrop.remove())}
document.getElementById("prevBtn").addEventListener("click",()=>{anchorMonth--;if(anchorMonth<0){anchorMonth=11;anchorYear--}renderMonths()});document.getElementById("nextBtn").addEventListener("click",()=>{anchorMonth++;if(anchorMonth>11){anchorMonth=0;anchorYear++}renderMonths()});document.getElementById("stepUp").addEventListener("click",()=>{monthsToShow=Math.min(12,monthsToShow+1);renderMonths()});document.getElementById("stepDown").addEventListener("click",()=>{monthsToShow=Math.max(1,monthsToShow-1);renderMonths()});loadEvents();
})();
</script>
</body>
</html>
